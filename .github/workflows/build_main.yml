name: Main

on:
  push:
    branches:
      - 'main'

jobs:
  build_apk_aab:
    name: Build qa artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Build and verify
        run: |
          ./gradlew :tools:analytics:checkAnalyticsDocs
          ./gradlew testQaUnitTest assembleQa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MUSIC_PLAYER_MIXPANEL_TOKEN: ${{ secrets.MUSIC_PLAYER_MIXPANEL_TOKEN }}
          AUDIO_BOOK_MIXPANEL_TOKEN: ${{ secrets.AUDIO_BOOK_MIXPANEL_TOKEN }}
      - name: Upload to Music Firebase
        run: |
          ./gradlew :apps:PlayerApp:appDistributionUploadQa
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Upload to Book Firebase
        run: |
          ./gradlew :apps:AudioBook:appDistributionUploadQa
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  build_desktop:
    name: Build desktop app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Package desktop for Linux (.deb)
        run: ./gradlew :apps:PlayerDesktop:packageDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload desktop .deb
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-deb
          path: apps/PlayerDesktop/build/compose/binaries/**/deb/*.deb
