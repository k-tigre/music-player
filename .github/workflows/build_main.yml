name: Main

on:
  push:
    branches:
      - 'main'

jobs:
  build_apk_aab:
    name: Build qa artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v1
        with: { java-version: 21 }
      - name: Build and verify
        run: |
          ./gradlew testQaUnitTest assembleQa
      - name: Upload to Music Firebase
        run: |
          ./gradlew :apps:PlayerApp:appDistributionUploadQa
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Upload to Book Firebase
        run: |
          ./gradlew :apps:AudioBook:appDistributionUploadQa
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

